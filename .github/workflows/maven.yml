name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout parent POM
    - name: Checkout parent POM
      uses: actions/checkout@v4
      with:
        repository: saundharpreet/top-cat-pom
        path: top-cat-pom

    # 2. Checkout current project
    - name: Checkout current project
      uses: actions/checkout@v4
      with:
        path: app

    # 3. Setup Java + Maven cache
    - name: Set up JDK 21 with Maven cache
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 4. Cache local Maven repo (extra optimization)
    - name: Cache Maven repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-${{ runner.os }}-

    # 5. Install parent POM
    - name: Install parent POM
      run: |
        cd top-cat-pom
        mvn -B clean install -DskipTests

    # 6. Build project
    - name: Build with Maven
      run: |
        cd app
        mvn -B package --file pom.xml
