name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout parent POM repo
    - name: Checkout parent POM
      uses: actions/checkout@v4
      with:
        repository: saundharpreet/top-cat-pom
        path: top-cat-pom

    # 2. Checkout current repo
    - name: Checkout current project
      uses: actions/checkout@v4
      with:
        path: app

    # 3. Set up Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 4. Install parent POM into local Maven repo
    - name: Install parent POM
      run: |
        cd top-cat-pom
        mvn clean install -DskipTests

    # 5. Build your project
    - name: Build with Maven
      run: |
        cd app
        mvn -B package --file pom.xml

    # 6. Dependency graph (optional)
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
